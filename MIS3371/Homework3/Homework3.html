<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
    <title>Patient Registration</title>
</head>
<body>
    <div id="header"> 
        <table width="100%">
            <tr>
                <td>
                    <img class="body" 
                        src="MedLogo.png" 
                        alt="Caduceus Insignia"
                    >
                </td>
                <td valign="top">Rhine Medicine</td>
                <td valign="bottom" align="right">Today's date: <span id="today">Date goes here</span></td>
            </tr>
        </table>
    </div>
    <hr>
    <form name="Patient-Registration"
        id="PatReg"
        action="Homework3-thanks.html"
    >
     <table class="form">
                <tr class="form">
                    <th class="form">Please Sign In</th>
                </tr>
                <tr class="form">
                    
                    <td><label for="firstname">Name: </label></td>
                    <td><input type="text"   
                            size="20"                                                     
                            id="firstname" 
                            name="firsttname"
                            required
                            onblur="checkFirstName()"
                            placeholder="First Name"
                            title="Letters, apostrophes, and dashes only!"
                        ></td>
                        <!-- size="25" minlength="1"
                            maxlength="30" -->
                        <!-- pattern="[A-Za-z'-]{1,30}" fname-->
                    <td><input type="text" 
                            size="1"
                            maxlength="1" 
                            id="middleinit" 
                            name="middleinit" 
                            onblur="checkMiddleInitial()"
                            placeholder="MI"
                            title="letters only, no numbers. OK to leave blank"                           
                        ></td>  
                        <!--pattern="[A-Za-z]{0,1}" mname-->
                    <td><input type="text"
                            size="20"
                            minlength="1"
                            maxlength="30" 
                            id="lastname" 
                            name="lastname"                            
                            required
                            onblur="checkLastName()"
                            placeholder="Last Name"   
                            title="Only letters, apostrophes, and dashes allowed"                       
                        ></td>
                        <!-- pattern="[A-Za-z2-5'-]{1,30}" lname-->    
                    <td><span id="name_message"></span></td>
                </tr>
                <tr class="form">
                    <td><label for="birthday">Date of Birth: </label></td>
                    <td><input type="date"
                        id="birthday"
                        name="birthday"
                        min="1906-01-01"
                        max="birthdayRestrictions()"
                        oninvalid="this.setCustomValidity('Impossible Date')"
                        oninput="this.setCustomValidity('')"
                        title="No dates set in the future or too far in the past"
                    >
                    
                    </td>
                    <!-- Remember to obscure SSN -->
                    <td><label for="ssn"> Social Security #: </label></td>
                    <td><input type="password"
                        maxlength="11"
                        minlength="9"
                        id="ssn"
                        name="ssn"
                        placeholder="XXX-XX-XXXX"
                        required
                        onblur="checkSocialSecurity()"
                    ></td>
                </tr>
                <div>
                <tr class="form">
                    <td><label for="Email">Email Address: </label></td>
                    <td><input type="email"
                        id="Email"
                        name="Email"
                        
                        required
                    ></td><br>
                    <!--pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[a-z]{2,20}$" email-->
                    <td><label for="phone">Phone Number: </label></td>
                    <td><input type="text"
                        id="phone"
                        name="phone"                        
                        placeholder="000-000-0000"
                        oninvalid="this.setCustomValidity('digits only')"
                        title="Numbers only"
                    ></td>
                    <!--pattern="[0-9]{10}" phone#-->
                </tr>
                </div>
                <div>
                <tr class="form">
                    <td><label for="addr1">Address 1: </label></td>
                    <td><input type="text"
                        maxlength="30"
                        size="50"
                        id="addr1"
                        name="addr1"
                        placeholder="123 Main St"
                        required
                        onblur="checkAddr1()"
                    ><span id="addr1_message"></span></td>

                </tr>
                <tr class="form">
                    <td><label for="addr2">Address 2: </label></td>
                    <td><input type="text"
                        maxlength="30"
                        size="50"
                        id="addr2"
                        name="addr2"
                        placeholder="Apt #"
                        onblur="checkAddr2()"
                    ><span id="addr2_message"></span></td>
                </tr>
                </div>
                <tr class="form">
                    <td><label for="city">City: </label></td>
                    <td><input type="text"
                        size="15"
                        maxlength="30"
                        id="city"
                        name="city"
                        required
                        onblur="checkCity()"
                    ><span id="city_message"></span></td>
                    <td><label for="state">State: </label></td>
                    <td><select required name="state">
                        <option value=""></option>
                        <option value="AL">AL</option>
	                    <option value="AK">AK</option>
	                    <option value="AR">AR</option>
	                    <option value="AZ">AZ</option>
	                    <option value="CA">CA</option>
	                    <option value="CO">CO</option>
	                    <option value="CT">CT</option>
	                    <option value="DC">DC</option>
	                    <option value="DE">DE</option>
	                    <option value="FL">FL</option>
	                    <option value="GA">GA</option>
	                    <option value="HI">HI</option>
	                    <option value="IA">IA</option>
	                    <option value="ID">ID</option>
	                    <option value="IL">IL</option>
	                    <option value="IN">IN</option>
	                    <option value="KS">KS</option>
	                    <option value="KY">KY</option>
	                    <option value="LA">LA</option>
	                    <option value="MA">MA</option>
	                    <option value="MD">MD</option>
	                    <option value="ME">ME</option>
	                    <option value="MI">MI</option>
	                    <option value="MN">MN</option>
	                    <option value="MO">MO</option>
	                    <option value="MS">MS</option>
	                    <option value="MT">MT</option>
	                    <option value="NC">NC</option>
	                    <option value="NE">NE</option>
	                    <option value="NH">NH</option>
	                    <option value="NJ">NJ</option>
	                    <option value="NM">NM</option>
	                    <option value="NV">NV</option>
	                    <option value="NY">NY</option>
	                    <option value="ND">ND</option>
	                    <option value="OH">OH</option>
	                    <option value="OK">OK</option>
	                    <option value="OR">OR</option>
	                    <option value="PA">PA</option>
                        <option value="PR">PR</option>
	                    <option value="RI">RI</option>
	                    <option value="SC">SC</option>
	                    <option value="SD">SD</option>
	                    <option value="TN">TN</option>
	                    <option value="TX">TX</option>
	                    <option value="UT">UT</option>
	                    <option value="VT">VT</option>
	                    <option value="VA">VA</option>
	                    <option value="WA">WA</option>
	                    <option value="WI">WI</option>
	                    <option value="WV">WV</option>
	                    <option value="WY">WY</option>
                    </select></td>
                    <!--Remember to make it so that when the user enters their 10 digit Zip, it
                        displays a 5 digit zip instead-->
                    <td><label for="zip">Zip Code: </label></td>
                    <td><input type="text"
                        size="5"
                        maxlength="5"
                        id="zip"
                        name="zip"                        
                        required
                        onblur="checkZip()"
                        placeholder="XXXXX"
                    ><span id="zip_message"></span></td>
                    <!--pattern="[0-9-]{5,10}" Zip-->
                </tr>
            </table>

            <table width="100%">
                <tr>
                    <td><p>Do you have any allergies?</p>
                    <label for="allergy1">Pollen</label>
                    <input type="checkbox"
                        id="allergy1"
                        name="allergy1"
                        value="Pollen"
                    ><br>
                    <label for="allergy2">Pets</label>
                    <input type="checkbox"
                        id="allergy2"
                        name="allergy2"
                        value="Pets"
                    ><br>
                    <label for="allergy3">Food</label>
                    <input type="checkbox"
                        id="allergy3"
                        name="allergy3"
                        value="Food"
                    ><br>
                    <label for="allergy4">Insects</label>
                    <input type="checkbox"
                        id="allergy4"
                        name="allergy4"
                        value="Insects"
                    ><br>
                    <label for="allergy5">Medication</label>
                    <input type="checkbox"
                        id="allergy5"
                        name="allergy5"
                        value="Medication"
                    ></td>
                    <td><p>Gender:</p>
                        <label for="Question-1">Male</label>
                        <input type="radio"
                            id="Question-1"
                            name="Question-1"
                            value="Male"
                        >
                        <label for="Question-1">Female</label>
                        <input type="radio"
                            id="Question-1"
                            name="Question-1"
                            value="Female"
                        >
                        <label for="Question-1">Other</label>
                        <input type="radio"
                            id="Question-1"
                            name="Question-1"
                            value="Other"
                        >
                        <p>Have you visited our hospital before? </p>
                        <label for="Question-2">Yes</label>
                        <input type="radio"
                            id="Question-2"
                            name="Question-2"
                            value="Yes"
                        >
                        <label for="Question-2">No</label>
                        <input type="radio"
                            id="Question-2"
                            name="Question-2"
                            value="No"
                        >
                    <td></td>
                    <td><p>Are you currently insured? </p>
                        <label for="Question-3">Yes</label>
                        <input type="radio"
                            id="Question-3"
                            name="Question-3"
                            value="Yes"
                        >
                        <label for="Question-3">No</label>
                        <input type="radio"
                            id="Question-3"
                            name="Question-3"
                            value="No"
                        >
                    </td>
                </tr>
            </table>
            <div>
                <p>On a scale of 1-10, how much pain are you in right now?</p>
                <input type="range" 
                    id="pain"
                    name="pain"
                    min="1" 
                    max="10" 
                    value="5" 
                    class="slider"
                    >
                    10&nbsp;<br>
                    <span id="rangedisplay"></span>
                <script>
                    const slider = document.getElementById("pain");
                    const output = document.getElementById("rangedisplay");
                    output.innerHTML = slider.value;
                    slider.oninput = function() {
                        output.innerHTML = this.value;
                    }
                </script>
            </div>
            <br>
            <tr class="form"> 
                <td><label for="Status">Please describe your current condition: </label></td>
                </tr>
                <tr class="form">
                    <td><textarea
                        rows="3"
                        cols="50"
                    ></textarea></td>
                </tr>
            <div>
                <label for="user">Username: </label><br>
                <input type="text"
                    id="user"
                    name="user"
                    minlength="5"
                    maxlength="30"                    
                    required
                    onblur="checkUserId()"
                    title="No special characters, no spaces, and at least 5 characters"
                ><br>
                <!--pattern="\w[A-Za-z0-9_-]{5,30}"-->
                <label for="password">Password: </label><br>
                <input type="password"
                    id="password"
                    name="password"
                    minlength="8"
                    maxlength="30"                    
                    required
                    oninput="checkPassword()"

                    title="At least 8 characters, no more than 30, and at least 1 Upper case letter
                        1 number, and 1 of the following special characters (^?-.*) "
                ><br>
                <!--pattern="[A-Za-z0-9^?=.*].{8,30}" pass1-->
                <label for="confirm">Confirm Password: </label><br>
                <input type="password"
                    id="confirm"
                    name="confirm"
                    minlength="8"
                    maxlength="30"
                    required
                    oninput="passwordMatch()"
                    onfocus="passwordMatch()"
                    onblur="passwordMatch()"
                    title="Please match the first password"
                >
                <table>
                    <tr>
                        <td> </td><td id="password_message1"></td><td> </td>
                    </tr>
                    <tr>
                        <td> </td><td id="password_message2"></td><td> </td>
                    </tr>
                    <tr>
                        <td> </td><td id="password_message3"></td><td> </td>
                    </tr>
                    <tr>
                        <td> </td><td id="password_message4"></td><td> </td>
                    </tr>
                    <tr>
                        <td> </td><td id="password_message5"></td><td> </td>
                    </tr>
                </table>
            </div>
            <table>
                <tr>
                    <td colspan="3">
                            <input type="button" 
                                id="getdata"
                                value="Review Info" 
                                onclick="retrieveData()"
                            >
                            <input type="button" id="check" value="check For Errors" onclick="checkForm()">                        
                            <input type="submit" id="submit" disabled>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <input type="reset" value="Start Over">                       
                    </td>
                </tr>
            </table>
        </form>
	<!--

    learn how to truncate zip code to 5 digits
    input type submit

     -->
        <hr>
	    <div id="footer">
            <a href="https://www.youtube.com/watch?v=XNfZTCPuZtQ&list=LL&index=157"
                target="_blank"
            >Contact Us!</a>
        </div>
    <p id="outputformdata"></p>

<script src="Homework3.js"></script>
<script>
	document.getElementById("today").innerHTML = new Date().toLocaleDateString();
</script>

</body>
</html>
